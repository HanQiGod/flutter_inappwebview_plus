name: flutter_inappwebview_plus
description: Flutter 升级 3.35.7 之后，对 flutter_inappwebview 插件的升级（After the Flutter upgrade to 3.35.7, the upgrade of the flutter_inappwebview plugin）。
version: 6.2.0
homepage: https://github.com/HanQiGod/flutter_inappwebview_plus/tree/main/flutter_inappwebview_plus
funding:
  - https://inappwebview.dev/donate/
topics:
  - html
  - webview
  - webview-flutter
  - inappwebview
  - browser

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_inappwebview_plus_platform_interface: ^1.3.0
  flutter_inappwebview_plus_android: ^1.1.3
  flutter_inappwebview_plus_ios: ^1.1.2
  flutter_inappwebview_plus_macos: ^1.1.2
  flutter_inappwebview_plus_web: ^1.1.2
  flutter_inappwebview_plus_windows: ^0.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  generators:
    path: ../dev_packages/generators

# For information on the generic Dart part of this file, see the
# following page: https://www.dartlang.org/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  plugin:
    platforms:
      android:
        default_package: flutter_inappwebview_plus_android
      ios:
        default_package: flutter_inappwebview_plus_ios
      macos:
        default_package: flutter_inappwebview_plus_macos
      web:
        default_package: flutter_inappwebview_plus_web
      windows:
        default_package: flutter_inappwebview_plus_windows

  assets:
    - packages/flutter_inappwebview_plus/assets/t_rex_runner/t-rex.html
    - packages/flutter_inappwebview_plus/assets/t_rex_runner/t-rex.css
  # To add assets to your plugin package, add an assets section, like this:
  # assets:
  #  - images/a_dot_burr.jpeg
  #  - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.io/assets-and-images/#from-packages
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.io/assets-and-images/#resolution-aware.

  # To add custom fonts to your plugin package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.io/custom-fonts/#from-packages

false_secrets:
  - /test_node_server/*.pem
  - /test_node_server/*.pfx
